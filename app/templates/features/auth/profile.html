{% extends 'base.html' %}

{% block title %}계정 관리 - StockLab{% endblock %}

{% block content %}
<div class="premium-card max-w-2xl mx-auto my-8">
    <div class="mb-12">
        <h2 class="text-4xl font-extrabold text-[var(--toss-text-main)] mb-4 tracking-tight">계정 관리</h2>
        <p class="text-[var(--toss-text-sub)] text-lg">내 정보를 확인하고 관리할 수 있습니다.</p>
    </div>

    <form id="profile-form" class="space-y-10">
        <div class="space-y-6">
        <div class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-semibold text-[var(--toss-text-sub)] mb-2 px-1">이메일 주소</label>
                <input type="email" id="email" name="email" required 
                    class="input-toss">
            </div>

            <div>
                <label for="nickname" class="block text-sm font-semibold text-[var(--toss-text-sub)] mb-2 px-1">닉네임</label>
                <input type="text" id="nickname" name="nickname" required 
                    class="input-toss">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-[var(--toss-text-sub)] mb-2 px-1">새 비밀번호</label>
                <input type="password" id="password" name="password" 
                    class="input-toss"
                    placeholder="변경 시에만 입력해 주세요">
            </div>
        </div>
        </div>

        <div class="pt-4">
            <button type="submit" class="w-full btn-toss h-14 text-lg">
                변경 사항 저장
            </button>
        </div>

        <div class="pt-16 mt-16 border-t border-[var(--toss-border)]">
            <h3 class="text-xl font-bold text-red-500 mb-4">위험 구역</h3>
            <div class="bg-red-50 rounded-2xl p-6 border border-red-100 mb-6">
                <p class="text-[var(--toss-text-sub)] text-sm leading-relaxed">
                    계정을 삭제하면 모든 투자 데이터와 자산 정보가 영구적으로 삭제되며 복구할 수 없습니다. 
                    신중하게 결정해 주세요.
                </p>
            </div>
            <button type="button" onclick="deleteAccount()" 
                class="w-full h-14 bg-white border-2 border-red-100 text-red-500 font-bold rounded-xl hover:bg-red-50 transition-all">
                회원 탈퇴하기
            </button>
        </div>

        <div class="text-center">
            <a href="{{ url_for('main.index') }}" class="text-[#4E5968] font-medium hover:text-[#191F28] transition-colors">
                메인으로 돌아가기
            </a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    const token = localStorage.getItem('access_token');
    if (!token) {
        window.location.href = "{{ url_for('auth.login_page') }}";
    }

    async function loadProfile() {
        try {
            const response = await fetch('/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            if (response.ok) {
                document.getElementById('email').value = data.email;
                document.getElementById('nickname').value = data.nickname;
            } else {
                logout();
            }
        } catch (err) {
            console.error(err);
        }
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const nickname = document.getElementById('nickname').value;
        const password = document.getElementById('password').value;
        
        const body = { email, nickname };
        if (password) body.password = password;
        
        try {
            const response = await fetch('/me', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(body)
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showToast('변경 사항이 저장되었습니다.', 'success');
                localStorage.setItem('user_nickname', data.user.nickname);
                setTimeout(() => window.location.reload(), 1000);
            } else {
                showToast('저장 실패: ' + data.msg, 'error');
            }
        } catch (err) {
            console.error(err);
            showToast('오류가 발생했습니다.', 'error');
        }
    });

    async function deleteAccount() {
        if (!confirm('정말로 탈퇴하시겠습니까?')) {
            return;
        }
        
        try {
            const response = await fetch('/me', {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            
            if (response.ok) {
                showToast('탈퇴 처리가 완료되었습니다.', 'success');
                setTimeout(() => logout(), 1000);
            } else {
                showToast('탈퇴 중 오류가 발생했습니다.', 'error');
            }
        } catch (err) {
            console.error(err);
            showToast('통신 중 오류가 발생했습니다.', 'error');
        }
    }

    loadProfile();
</script>
{% endblock %}
