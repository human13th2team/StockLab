{% extends 'base.html' %}

{% block title %}로그인 - StockLab{% endblock %}

{% block content %}
<div class="premium-card max-w-md mx-auto my-8">
    <div class="mb-12">
        <h2 class="text-4xl font-extrabold text-[var(--toss-text-main)] mb-4 tracking-tight">로그인</h2>
        <p class="text-[var(--toss-text-sub)] text-lg">StockLab에서 스마트한 투자를 시작하세요.</p>
    </div>

    <form id="login-form" class="space-y-8">
        <div>
            <label for="email" class="block text-sm font-semibold text-[var(--toss-text-sub)] mb-2 px-1">이메일 주소</label>
            <input type="email" id="email" name="email" required 
                class="input-toss"
                placeholder="이메일을 입력해 주세요">
        </div>

        <div>
            <label for="password" class="block text-sm font-semibold text-[var(--toss-text-sub)] mb-2 px-1">비밀번호</label>
            <input type="password" id="password" name="password" required 
                class="input-toss"
                placeholder="비밀번호를 입력해 주세요">
        </div>

        <div class="pt-4">
            <button type="submit" class="w-full btn-toss h-14 text-lg">
                로그인
            </button>
        </div>

        <div class="text-center pt-6">
            <p class="text-[var(--toss-text-sub)]">
                아직 회원이 아니신가요? 
                <a href="{{ url_for('auth.signup_page') }}" class="text-tossBlue font-bold hover:underline ml-2">회원가입</a>
            </p>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('user_nickname', data.user.nickname);
            showToast(`${data.user.nickname} 대표님, 환영합니다!`, 'success');
            setTimeout(() => {
                window.location.href = "{{ url_for('main.index') }}";
            }, 1000);
        } else {
            showToast('로그인 실패: ' + data.msg, 'error');
        }
    } catch (err) {
        console.error(err);
        showToast('로그인 중 서버 오류가 발생했습니다.', 'error');
    }
});
</script>
{% endblock %}
