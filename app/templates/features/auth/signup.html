{% extends 'base.html' %}

{% block title %}회원가입 - StockLab{% endblock %}

{% block content %}
<div class="premium-card max-w-md mx-auto my-8">
    <div class="mb-12">
        <h2 class="text-4xl font-extrabold text-[var(--toss-text-main)] mb-4 tracking-tight">회원가입</h2>
        <p class="text-[var(--toss-text-sub)] text-lg">지금 가입하고 <span class="text-tossBlue font-bold">100만 원</span>의 모의 투자금을 받으세요.</p>
    </div>

    <form id="signup-form" class="space-y-8">
        <div>
            <label for="email" class="block text-sm font-semibold text-[var(--toss-text-sub)] mb-2 px-1">이메일 주소</label>
            <input type="email" id="email" name="email" required 
                class="input-toss"
                placeholder="이메일을 입력해 주세요">
        </div>

        <div>
            <label for="nickname" class="block text-sm font-semibold text-[var(--toss-text-sub)] mb-2 px-1">닉네임</label>
            <input type="text" id="nickname" name="nickname" required 
                class="input-toss"
                placeholder="사용하실 닉네임을 입력해 주세요">
        </div>

        <div>
            <label for="password" class="block text-sm font-semibold text-[var(--toss-text-sub)] mb-2 px-1">비밀번호</label>
            <input type="password" id="password" name="password" required 
                class="input-toss"
                placeholder="비밀번호를 입력해 주세요">
        </div>

        <div class="pt-4">
            <button type="submit" class="w-full btn-toss h-14 text-lg">
                가입하기
            </button>
        </div>

        <div class="text-center pt-6">
            <p class="text-[var(--toss-text-sub)]">
                이미 계정이 있으신가요? 
                <a href="{{ url_for('auth.login_page') }}" class="text-tossBlue font-bold hover:underline ml-2">로그인</a>
            </p>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const nickname = document.getElementById('nickname').value;
    const password = document.getElementById('password').value;
    
    try {
        const response = await fetch('/signup', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, nickname, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showToast('회원가입 성공! 로그인해 주세요.', 'success');
            setTimeout(() => {
                window.location.href = "{{ url_for('auth.login_page') }}";
            }, 1500);
        } else {
            showToast('회원가입 실패: ' + data.msg, 'error');
        }
    } catch (err) {
        console.error(err);
        showToast('회원가입 중 서버 오류가 발생했습니다.', 'error');
    }
});
</script>
{% endblock %}
