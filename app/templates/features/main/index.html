{% extends "base.html" %}

{% block title %}Dashboard - 가동 중{% endblock %}

{% block styles %}
<style>
    .asset-card {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
</style>
{% endblock %}

{% block content %}
<div id="user-section" class="hidden">
    <div class="flex flex-col md:flex-row justify-between items-end mb-10 pb-6 border-b border-slate-100">
        <div>
            <h2 class="text-3xl font-bold text-slate-800">👋 <span id="user-nickname" class="text-indigo-600">대표님</span>, 로그인을 환영합니다!</h2>
            <p class="text-slate-500 mt-1">계정 관리와 초기 자산을 확인해 보세요.</p>
        </div>
        <button onclick="logout()" class="mt-4 md:mt-0 text-red-500 font-semibold hover:text-red-700 transition-colors">로그아웃</button>
    </div>

    <!-- 총 자산 카드 (초기 1억 확인용) -->
    <div class="max-w-md">
        <div class="asset-card p-8 rounded-3xl text-white shadow-2xl overflow-hidden relative group">
            <h3 class="text-indigo-300 font-semibold uppercase tracking-wider mb-2">Total Balance (초기 가입금)</h3>
            <div class="flex items-baseline space-x-2">
                <span class="text-4xl font-black">₩</span>
                <span id="total-cash" class="text-5xl font-black tabular-nums tracking-tight">0</span>
            </div>
            <div class="mt-8 pt-6 border-t border-slate-700/50 flex justify-between">
                <div>
                    <p class="text-slate-400 text-sm">가용한 현금</p>
                    <p id="available-cash" class="font-bold text-xl">0</p>
                </div>
                <div class="text-right">
                    <p class="text-slate-400 text-sm">예수금</p>
                    <p id="deposit-cash" class="font-bold text-xl">0</p>
                </div>
            </div>
        </div>
        
        <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('main.trading') }}" class="inline-block px-8 py-4 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 shadow-xl transition-all">📈 주식 거래하러 가기</a>
            <a href="{{ url_for('auth.profile_page') }}" class="inline-block px-8 py-4 bg-slate-600 text-white font-bold rounded-xl hover:bg-slate-700 shadow-xl transition-all">👤 내 정보 수정하기</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function checkAuth() {
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = "{{ url_for('auth.login_page') }}";
            return;
        }

        try {
            const response = await fetch('/api/auth/me', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });

            if (response.ok) {
                const data = await response.json();
                document.getElementById('user-section').classList.remove('hidden');
                document.getElementById('user-nickname').textContent = data.nickname;
                
                const total = data.cash + data.deposit;
                document.getElementById('total-cash').textContent = total.toLocaleString();
                document.getElementById('available-cash').textContent = '₩' + data.cash.toLocaleString();
                document.getElementById('deposit-cash').textContent = '₩' + data.deposit.toLocaleString();
            } else {
                localStorage.removeItem('access_token');
                window.location.href = "{{ url_for('auth.login_page') }}";
            }
        } catch (err) {
            console.error(err);
            window.location.href = "{{ url_for('auth.login_page') }}";
        }
    }

    checkAuth();
</script>
{% endblock %}
