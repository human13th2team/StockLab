{% extends "base.html" %}

{% block title %}로그인{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold text-slate-900 mb-8 text-center">로그인</h1>
        <form class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">사용자 아이디</label>
                <input type="text" placeholder="아이디를 입력하세요" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
                <input type="password" placeholder="비밀번호를 입력하세요" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-all shadow-md mt-4">로그인하기</button>
        </form>
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-slate-500 text-sm">
                계정이 없으신가요? <a href="#" class="text-indigo-600 font-semibold hover:underline">회원가입</a>
            </p>
        </div>
    </div>
{% endblock %}
