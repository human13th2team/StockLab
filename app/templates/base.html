<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockLab - {% block title %}{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    {% block styles %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <header class="bg-indigo-700 text-white shadow-lg">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight">
                <a href="{{ url_for('main.index') }}" class="hover:text-indigo-200 transition-colors">StockLab</a>
            </div>
            <ul id="nav-links" class="flex space-x-8 font-medium">
                <li><a href="{{ url_for('main.index') }}" class="hover:text-indigo-200 transition-colors">홈</a></li>
                <li id="guest-nav"><a href="{{ url_for('auth.login_page') }}" class="px-4 py-2 bg-indigo-500 rounded-lg hover:bg-indigo-400 transition-all">로그인</a></li>
                <li id="user-nav" class="hidden flex space-x-4">
                    <a href="{{ url_for('auth.profile_page') }}" class="hover:text-indigo-200 transition-colors">내 정보 수정</a>
                    <button onclick="logout()" class="text-indigo-200 hover:text-white transition-colors">로그아웃</button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12 flex-grow">
        <div class="bg-white rounded-2xl shadow-sm p-8 md:p-12 border border-slate-100">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="bg-slate-800 text-slate-400 py-8 border-t border-slate-700">
        <div class="container mx-auto px-6 text-center">
            <p>&copy; 2024 StockLab Team Project. All rights reserved.</p>
        </div>
    </footer>

    <script>
        function checkGlobalAuth() {
            const token = localStorage.getItem('access_token');
            const guestNav = document.getElementById('guest-nav');
            const userNav = document.getElementById('user-nav');
            
            if (token && guestNav && userNav) {
                guestNav.classList.add('hidden');
                userNav.classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_nickname');
            window.location.href = "{{ url_for('auth.login_page') }}";
        }

        window.addEventListener('DOMContentLoaded', checkGlobalAuth);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
