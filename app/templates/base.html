<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockLab - {% block title %}{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tossBlue: '#0064FF',
                        kakaoYellow: '#FEE500',
                    },
                    borderRadius: {
                        'premium': '24px',
                    }
                }
            }
        }
    </script>
    {% block styles %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col">
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight text-tossBlue">
                <a href="{{ url_for('main.index') }}" class="hover:opacity-80 transition-opacity">StockLab</a>
            </div>
            <ul id="nav-links" class="flex space-x-6 items-center">
                <li><a href="{{ url_for('main.index') }}" class="nav-link">홈</a></li>
                <li id="guest-nav"><a href="{{ url_for('auth.login_page') }}" class="btn-toss">로그인</a></li>
                <li id="user-nav" class="hidden flex space-x-4 items-center">
                    <a href="{{ url_for('auth.profile_page') }}" class="nav-link">내 정보</a>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 text-sm transition-colors">로그아웃</button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12 flex-grow max-w-6xl">
        {% block content %}{% endblock %}
    </main>

    <div id="toast-container"></div>

    <footer class="bg-gray-50 text-gray-400 py-12 border-t border-gray-100 mt-20">
        <div class="container mx-auto px-6 text-center">
            <p class="text-sm">&copy; 2024 StockLab Premium Services. All rights reserved.</p>
        </div>
    </footer>

    <script>
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            let icon = '';
            if (type === 'success') icon = '✅';
            else if (type === 'error') icon = '❌';
            else icon = 'ℹ️';

            toast.innerHTML = `
                <span class="text-lg">${icon}</span>
                <span class="toast-message">${message}</span>
            `;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function checkGlobalAuth() {
            const token = localStorage.getItem('access_token');
            const guestNav = document.getElementById('guest-nav');
            const userNav = document.getElementById('user-nav');
            
            if (token && guestNav && userNav) {
                guestNav.classList.add('hidden');
                userNav.classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_nickname');
            showToast('성공적으로 로그아웃되었습니다.', 'success');
            setTimeout(() => {
                window.location.href = "{{ url_for('auth.login_page') }}";
            }, 1000);
        }

        window.addEventListener('DOMContentLoaded', checkGlobalAuth);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
