{% extends "base.html" %}

{% block title %}분석 리포트{% endblock %}

{% block content %}
    <div class="space-y-8">
        <div class="flex justify-between items-end border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 mb-2">분석 리포트</h1>
                <p class="text-slate-500">실시간 주식 정보 및 트렌드 분석 결과를 확인할 수 있습니다.</p>
            </div>
            <div class="bg-indigo-50 text-indigo-700 font-bold px-4 py-2 rounded-lg text-sm border border-indigo-100">
                AI 분석 완료
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 샘플 카드 1 -->
            <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
                <p class="text-sm font-medium text-slate-500 mb-1">오늘의 한마디</p>
                <p class="text-xl font-bold text-slate-900 italic">"분석 담당자님, 이곳을 멋지게 채워주세요!"</p>
            </div>
            <!-- 샘플 카드 2 -->
            <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
                <p class="text-sm font-medium text-slate-500 mb-1">상승 종목 비율</p>
                <div class="flex items-center space-x-2">
                    <span class="text-2xl font-bold text-emerald-600">65.4%</span>
                    <span class="text-xs font-medium bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded shadow-sm">▲ 2.1%</span>
                </div>
            </div>
            <!-- 샘플 카드 3 -->
            <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
                <p class="text-sm font-medium text-slate-500 mb-1">위험 지수</p>
                <div class="flex items-center space-x-2">
                    <span class="text-2xl font-bold text-amber-600">보통</span>
                    <span class="text-xs font-medium bg-amber-100 text-amber-700 px-2 py-0.5 rounded shadow-sm">안정적</span>
                </div>
            </div>
        </div>

        <div class="p-12 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center text-center">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">분석 데이터 대기 중</h3>
            <p class="text-slate-500 mb-6">데이터를 수집하고 가공하면 여기에 차트와 표가 나타납니다.</p>
            <button class="px-5 py-2.5 bg-slate-900 text-white font-semibold rounded-xl hover:bg-slate-800 transition-all">데이터 수집 시작하기</button>
        </div>
    </div>
{% endblock %}
